spring.application.name=fitness-backend

spring.datasource.url=jdbc:h2:file:./data/fitnessdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=replace-this-with-a-very-long-secret-key-at-least-32-bytes
app.jwt.expiration-ms=86400000
app.cors.allowed-origin=http://localhost:5173

app.admin.username=admin
app.admin.password=admin1234
app.admin.name=Administrator
